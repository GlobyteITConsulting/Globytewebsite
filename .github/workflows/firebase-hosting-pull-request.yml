# This file was auto-generated by the Firebase CLI.
# Updated to include Cloud Functions deployment for RAG system
name: Deploy to Firebase Hosting on PR

on:
  pull_request:

# The permissions block is required for the action to comment the preview URL on the PR
permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    # A single, long-running job is used for efficiency
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      
      - name: 📥 Install Functions Dependencies
        run: |
          cd functions
          npm ci
      
      - name: 🔧 Install Firebase CLI
        run: npm install -g firebase-tools
      
      # Note: Functions are only deployed on merge to main, not on PRs
      # This prevents unnecessary deployments and potential conflicts
      
      # --- Deploy to Preview Channel ---
      - name: 🌐 Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GLOBYTE }}
          projectId: globyteus

