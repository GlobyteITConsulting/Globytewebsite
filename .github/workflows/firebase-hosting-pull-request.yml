# This file was auto-generated by the Firebase CLI.
# Updated to include secret replacement for preview testing
name: Deploy to Firebase Hosting on PR

on:
  pull_request:

# The permissions block is required for the action to comment the preview URL on the PR
permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🔄 Replace Placeholders in Frontend
        run: |
          # Replace placeholders in chatbot-rag.js
          if [ -f "chatbot-rag.js" ]; then
            # Google Gemini API key
            sed -i "s|__GEMINI_API_KEY__|${{ secrets.GEMINI_API_KEY }}|g" chatbot-rag.js
            # Firebase Function URL
            sed -i "s|__FIREBASE_FUNCTION_URL__|${{ secrets.FIREBASE_FUNCTION_URL }}|g" chatbot-rag.js
            # Groq keys (commented out but still replace if present)
            sed -i "s|__GROQ_API_KEY_1__|${{ secrets.GROQ_API_KEY_1 }}|g" chatbot-rag.js
            sed -i "s|__GROQ_API_KEY_2__|${{ secrets.GROQ_API_KEY_2 }}|g" chatbot-rag.js
            sed -i "s|__GROQ_API_KEY_3__|${{ secrets.GROQ_API_KEY_3 }}|g" chatbot-rag.js
            echo "✅ Replaced placeholders in chatbot-rag.js"
          fi
          
          # Replace Firebase config placeholders in index.html
          if [ -f "index.html" ]; then
            sed -i "s|__FIREBASE_API_KEY__|${{ secrets.FIREBASE_API_KEY }}|g" index.html
            sed -i "s|__FIREBASE_MESSAGING_SENDER_ID__|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" index.html
            sed -i "s|__FIREBASE_APP_ID__|${{ secrets.FIREBASE_APP_ID }}|g" index.html
            echo "✅ Replaced Firebase config in index.html"
          fi
      
      # --- Deploy to Preview Channel ---
      # Note: Functions are only deployed on merge to main, not on PRs
      # Preview uses the same backend (Firestore + Cloud Functions) as production
      - name: 🌐 Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GLOBYTE }}
          projectId: globyteus

